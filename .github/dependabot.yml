version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "monthly"
    assignees:
      - "mkaraki"
    groups:
      cargo-all:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    assignees:
      - "mkaraki"
    groups:
      npm-all:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/static-generator"
    schedule:
      interval: "monthly"
    assignees:
      - "mkaraki"
    groups:
      static-npm-all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    assignees:
      - "mkaraki"
    groups:
      actions-all:
        patterns:
          - "*"
